name: 更新插件下载量

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-download:
    if: github.repository == 'HolyFoxTeam/napcat-plugin-community-index'
    name: 更新下载量
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 运行更新脚本
        run: node scripts/update-download-count.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 提交数据更改到 store 分支
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin store 2>/dev/null || true
          if git show-ref --verify --quiet refs/heads/store; then
            git checkout store
          else
            git checkout --orphan store
          fi

          git rm -rf --ignore-unmatch .

          if [ ! -f plugin-release-data.json ]; then
            echo "❌ plugin-release-data.json 不存在，无法提交"
            exit 1
          fi

          git add plugin-release-data.json

          if git diff --cached --quiet; then
            echo "⚠️ plugin-release-data.json 无变化，跳过提交"
          else
            git commit -m "chore: 更新插件下载量"
            echo "✅ 提交成功，准备强制推送 store 分支"
            git push --force origin store
          fi
