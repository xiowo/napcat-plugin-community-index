name: 更新插件下载量

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-download:
    if: github.repository == 'HolyFoxTeam/napcat-plugin-community-index'
    name: 更新下载量
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 更新下载量
        run: node scripts/update-download-count.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 提交更改到 store 分支
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin store 2>/dev/null || true
          if git show-ref --verify --quiet refs/heads/store; then
            git checkout store
          else
            git checkout --orphan store
          fi
          git add plugins.v4.json
          if git diff --cached --quiet; then
            echo "⚠️ 无文件变化，跳过提交"
          else
            git commit -m "chore: 更新插件下载量"
            echo "✅ 提交成功，准备强制推送 store 分支"
            git push --force origin store
          fi